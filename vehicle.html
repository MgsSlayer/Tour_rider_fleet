<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Detail — Tour Rider</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <img src="css/logo_tour_ride-removebg-preview-1-3-300x175.png" alt="Tour Rider" class="logo-img">
    </a>
    <nav>
      <a href="index.html">← All Vehicles</a>
    </nav>
  </div>
</header>

<main>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading vehicle details…</p>
  </div>

  <!-- Error -->
  <div id="error-state" style="display:none">
    <div class="breadcrumb">
      <a href="index.html">← Back to listings</a>
    </div>
    <div class="alert alert-error" id="error-msg"></div>
  </div>

  <!-- Vehicle content -->
  <div id="vehicle-content" style="display:none">

    <div class="breadcrumb">
      <a href="index.html">Listings</a>
      <span class="breadcrumb-sep">/</span>
      <span id="page-title">Vehicle</span>
    </div>

    <div class="vehicle-detail">

      <!-- Left: image -->
      <div>
        <div class="detail-image-wrap" id="image-wrap"></div>
      </div>

      <!-- Right: details -->
      <div class="detail-sidebar">
        <h1 class="detail-title" id="detail-title"></h1>
        <span class="type-pill" id="detail-type-badge" style="display:none"></span>

<div class="specs-grid">
          <div class="spec-item">
            <div class="spec-label">Make</div>
            <div class="spec-value" id="spec-make">—</div>
          </div>
          <div class="spec-item">
            <div class="spec-label">Model</div>
            <div class="spec-value" id="spec-model">—</div>
          </div>
          <div class="spec-item">
            <div class="spec-label">Type</div>
            <div class="spec-value" id="spec-type">—</div>
          </div>
          <div class="spec-item">
            <div class="spec-label">Capacity</div>
            <div class="spec-value" id="spec-capacity">—</div>
          </div>
          <div class="spec-item">
            <div class="spec-label">Luggage</div>
            <div class="spec-value" id="spec-luggage">—</div>
          </div>
        </div>

        <button class="share-btn" id="share-btn">🔗 Copy Link</button>
      </div>

    </div>
  </div>

</main>

<footer>
  <p>© Tour Rider — NYC Limo &amp; Party Bus Rentals</p>
</footer>

<script src="config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/vehicle.js"></script>

</body>
</html>
